services:
  - type: web
    name: incident-reporting-backend
    env: node
    rootDir: backend
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: PORT
        value: 3001
      - key: JWT_SECRET
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: incident-reporting-db
          property: connectionString

databases:
  - name: incident-reporting-db
    databaseName: incident_db
    user: admin
